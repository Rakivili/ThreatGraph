threatgraph:
  # ── produce side (write to ClickHouse) ──────────────────────────

  input:
    redis:
      addr: 127.0.0.1:6379
      password: ""
      db: 0
      key: sysmon_events
      block_timeout: 5s

  pipeline:
    workers: 8
    batch_size: 1000
    flush_interval: 2s

  graph:
    write_vertex_rows: false
    include_edge_data: false

  rules:
    enabled: true
    path: "./rules/sigma"

  # Adjacency rows → ClickHouse (used by produce)
  output:
    mode: clickhouse
    clickhouse:
      url: http://127.0.0.1:8123
      database: threatgraph
      table: adjacency
      username: default
      password: ""
      timeout: 5s

  # IOA events → ClickHouse (used by produce)
  ioa:
    enabled: true
    output:
      mode: clickhouse
      clickhouse:
        url: http://127.0.0.1:8123
        database: threatgraph
        table: ioa_events
        username: default
        password: ""
        timeout: 5s

  replay_capture:
    enabled: false
    file:
      path: output/raw_events.jsonl

  logging:
    enabled: true
    level: info
    file: ""
    console: true

  # ── serve side (poll ClickHouse → incremental analysis) ─────────

  serve:
    analyze:
      window: 2h        # lookback window for adjacency rows (2-6h for Windows)
      interval: 30s     # polling interval
      batch_size: 1000  # IOA micro-batch size per poll
      min_seq: 2        # minimum kill-chain sequence length
      workers: 4        # concurrent host analysis goroutines
      adjacency_table: adjacency   # ClickHouse adjacency table name
      ioa_table: ioa_events        # ClickHouse IOA events table name
      processed_table: ioa_processed # IOA processed marker table
      clickhouse:
        url: http://127.0.0.1:8123
        database: threatgraph
        username: default
        password: ""
        timeout: 10s

    incident:
      mode: file        # file | http
      file:
        path: output/incidents.jsonl
      http:
        url: http://127.0.0.1:9090/api/incidents
        timeout: 5s
