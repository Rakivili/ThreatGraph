threatgraph:
  input:
    mode: elasticsearch
    elasticsearch:
      url: https://127.0.0.1:9200
      username: elastic
      password: ""
      index: edr-offline-ls-*
      since: 2026-03-04T00:00:00Z
      until: 2026-03-05T00:00:00Z
      host_prefilter: true
      batch_size: 2000
      scroll: 5m
      timeout: 30s

  pipeline:
    workers: 8
    batch_size: 1000
    flush_interval: 2s

  graph:
    write_vertex_rows: false
    include_edge_data: false

  rules:
    enabled: false
    path: "./rules/sigma"

  output:
    mode: file
    file:
      path: output/adjacency.jsonl

  ioa:
    enabled: true
    output:
      mode: file # file | clickhouse
      file:
        path: output/ioa_events.jsonl
      clickhouse:
        url: http://127.0.0.1:8123
        database: threatgraph
        table: ioa_events
        username: default
        password: ""
        timeout: 5s
        headers: {}

  replay_capture:
    enabled: false
    file:
      path: output/raw_events.jsonl
    batch_size: 1000
    flush_interval: 2s

  logging:
    enabled: true
    level: info
    file: ""
    console: true

  metrics:
    enabled: false
    addr: ":9091"
